<style>
  .footer {
    margin-top: 0 !important;
    padding-top: 0 !important;
  }

</style>
{% if site.data.settings.hero.enable == true %}
<div class="hero__container">
    <div class="hero">
        <div class="hero__wrapper">
            <div class="hero__visual" aria-label="Lab operating signals">
              <img src="{{ site.data.settings.hero.hero__image }}" alt="{{ site.data.settings.title }}" class="hero__image">
              <img src="{{ site.data.settings.hero.hero__image_mobile }}" alt="{{ site.data.settings.title }}" class="hero__image--mobile">
            </div>
            <div class="hero__content">
                <div class="hero__title">
                    <p>Decision analytics R&amp;D for operational systems.</p>
                </div>
                <div class="hero__metrics" aria-label="Datart Lab capabilities">
                  <div>
                    <span>Model</span>
                    <strong>Problems</strong>
                  </div>
                  <div>
                    <span>Build</span>
                    <strong>Engines</strong>
                  </div>
                  <div>
                    <span>Create</span>
                    <strong>Value</strong>
                  </div>
                </div>
                {% if page.image_caption %}
                <div class="hero__caption">{{ page.image_caption | markdownify | replace: '<p>' | replace: '</p>' }}</div>
                {%endif %}
            </div>
        </div>
    </div>
</div>
{% endif %}
