#-------------------------------
# Contact Section
contact:
  enable: true
  contact__title: Contact
  contact__intro: Reach out to us at
  contact__email: team@datart-lab.com
  contact__signals:
    - Future talent
    - Research partners
    - Industry teams
  contact__items:
    - title: Curious Minds & Future Talent
      content: If you are eager to grow in data analytics, optimization, or software development, Datart Lab offers opportunities to work on real projects and gain valuable experience. Whether you are an undergraduate or graduate student, you can *join our projects to learn, contribute, and develop your skills*.
    - title: Fellow Thinkers & Collaborators
      content: We highly value collaborations with academics and researchers who share our interests. If you would like to co-develop *research projects, publish scientific papers, or partner on international grant applications*, our door is always open.
    - title: Industry Partners
      content: Datart Lab designs solutions for complex decision-making and optimization problems in industry. If *your company needs data-driven decision support systems, custom software solutions, or advanced analytics engines*, we are ready to collaborate and build tailored projects together.

