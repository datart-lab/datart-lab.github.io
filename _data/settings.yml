#-------------------------------
# Work Settings
work:
  enable: true
  work__title: Selected Projects
  work__description: At **Datart Lab**, we design and build **intelligent optimization engines** from the ground up — starting with **mathematical models** and **algorithms** and extending all the way to **robust software systems** and **user-friendly applications**. We combine **rigorous research** with **real-world impact**. By leading government-funded projects and contributing to **state-of-the-art academic work**, we ensure our methods remain **innovative**, **validated**, and **impactful**. At the same time, we partner with companies in logistics, transportation, healthcare, and beyond to turn complex challenges into **practical, scalable solutions**.


